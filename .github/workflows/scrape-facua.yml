name: Scraping semanal — FACUA

on:
  schedule:
    - cron: "0 6 * * 1"   # todos los lunes 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Instalar navegador de Playwright
        working-directory: backend
        run: playwright install --with-deps chromium
      - name: Ejecutar FACUA
        working-directory: backend
        run: python scheduler/run_facua.py
      - name: Commitear precios.json y la BBDD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/public_data/precios.json backend/data/precios.db
          git diff --staged --quiet || git commit -m "chore: actualiza precios FACUA ($(date -u +%Y-%m-%d))"
          git push
