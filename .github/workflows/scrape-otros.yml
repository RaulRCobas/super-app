name: Scraping semanal — Lidl/Supeco/Gadis

on:
  schedule:
    - cron: "0 7 * * 1"   # todos los lunes 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Instalar navegador de Playwright
        working-directory: backend
        run: playwright install --with-deps chromium
      - name: Ejecutar Lidl/Supeco/Gadis
        working-directory: backend
        env:
          GADISLINE_EMAIL: ${{ secrets.GADISLINE_EMAIL }}
          GADISLINE_PASSWORD: ${{ secrets.GADISLINE_PASSWORD }}
        run: python scheduler/run_otros.py
      - name: Commitear precios.json y la BBDD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/public_data/precios.json backend/data/precios.db
          git diff --staged --quiet || git commit -m "chore: actualiza precios Lidl/Supeco/Gadis ($(date -u +%Y-%m-%d))"
          git push
